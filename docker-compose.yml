# ============================================================================
# Kitchen Companion - Docker Compose
# ============================================================================
#
# Usage:
#   docker compose pull            # pull latest image from GHCR
#   docker compose up -d           # start in background
#   docker compose down            # stop and remove container
#   docker compose logs -f web     # follow logs
#   docker compose build           # local dev build (fallback if not using GHCR)
#
# The SQLite DB and uploaded images live in named volumes so they persist
# across container restarts and rebuilds.

services:
  web:
    image: ghcr.io/ianauger/kitchen-companion:latest
    pull_policy: always
    container_name: kitchen-companion
    ports:
      - "5000:5000"
    volumes:
      # Persist the SQLite database across container restarts
      - db-data:/app/instance
      # Persist uploaded recipe images
      - upload-data:/app/app/static/uploads/recipes
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  db-data:
    driver: local
  upload-data:
    driver: local
