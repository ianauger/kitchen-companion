{% extends "layout.html" %}

{% block title %}Shopping List - Kitchen Companion{% endblock %}

{% block content %}
<div class="p-4 md:p-8 max-w-3xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-900 flex items-center">
            <span class="text-3xl mr-3">🛒</span>Shopping List
        </h1>
        <div class="flex gap-2">
            <button id="clear-purchased-btn" 
                class="px-4 py-2 text-sm font-medium text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-xl transition-colors"
                title="Remove checked items">
                Clear Checked
            </button>
            <button id="add-manual-btn"
                class="px-4 py-2 text-sm font-medium bg-primary-600 text-white rounded-xl hover:bg-primary-700 transition-colors">
                + Add Item
            </button>
        </div>
    </div>

    <!-- Manual Add Form -->
    <form id="manual-add-form" class="hidden mb-6 bg-white p-4 rounded-2xl border border-gray-200 shadow-sm">
        <div class="flex gap-3">
            <input type="text" id="manual-item-input" 
                class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-primary-500 focus:border-primary-500 text-base"
                placeholder="e.g., 2 lbs chicken thighs"
                maxlength="500">
            <button type="submit"
                class="px-6 py-3 bg-primary-600 text-white font-semibold rounded-xl hover:bg-primary-700 transition-colors">
                Add
            </button>
        </div>
    </form>

    <!-- Shopping List -->
    <div id="shopping-list" class="space-y-3">
        <!-- Loaded dynamically -->
    </div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
        <div class="text-6xl mb-4">🛒</div>
        <h2 class="text-xl font-semibold text-gray-700 mb-2">Your shopping list is empty</h2>
        <p class="text-gray-400">Add ingredients from recipes or manually</p>
    </div>
</div>

<script>
    async function loadShoppingList() {
        try {
            const response = await fetch('/api/shopping-items');
            if (!response.ok) throw new Error('Failed to load');
            const items = await response.json();
            renderShoppingList(items);
        } catch (error) {
            console.error('Error loading shopping list:', error);
        }
    }

    function renderShoppingList(items) {
        const container = document.getElementById('shopping-list');
        const emptyState = document.getElementById('empty-state');

        if (!items || items.length === 0) {
            container.innerHTML = '';
            emptyState.classList.remove('hidden');
            return;
        }

        emptyState.classList.add('hidden');

        container.innerHTML = items.map(item => `
            <div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-shadow p-4 flex items-center gap-4 ${item.purchased ? 'opacity-50' : ''}">
                <input type="checkbox" 
                    class="w-5 h-5 md:w-6 md:h-6 rounded-lg border-gray-300 text-primary-600 focus:ring-primary-500 cursor-pointer flex-shrink-0"
                    ${item.purchased ? 'checked' : ''}
                    onchange="togglePurchased(${item.id}, this.checked)"
                >
                <div class="flex-1 min-w-0">
                    <p class="text-base md:text-lg text-gray-800 ${item.purchased ? 'line-through' : ''}">${escapeHtml(item.name)}</p>
                    ${item.recipe_title ? `<p class="text-xs text-gray-400 mt-1">From: ${escapeHtml(item.recipe_title)}</p>` : ''}
                </div>
                <button onclick="deleteItem(${item.id})"
                    class="min-w-[44px] min-h-[44px] p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors flex-shrink-0"
                    title="Remove"
                    aria-label="Remove item">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function togglePurchased(itemId, purchased) {
        try {
            await fetch(`/api/shopping-items/${itemId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ purchased })
            });
            await loadShoppingList();
        } catch (error) {
            console.error('Error updating item:', error);
        }
    }

    async function deleteItem(itemId) {
        try {
            await fetch(`/api/shopping-items/${itemId}`, { method: 'DELETE' });
            await loadShoppingList();
        } catch (error) {
            console.error('Error deleting item:', error);
        }
    }

    // Manual add form toggle
    document.getElementById('add-manual-btn').addEventListener('click', () => {
        const form = document.getElementById('manual-add-form');
        form.classList.toggle('hidden');
        if (!form.classList.contains('hidden')) {
            document.getElementById('manual-item-input').focus();
        }
    });

    // Manual add submit
    document.getElementById('manual-add-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const input = document.getElementById('manual-item-input');
        const name = input.value.trim();
        if (!name) return;

        try {
            const response = await fetch('/api/shopping-items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ items: [{ name }] })
            });
            if (!response.ok) throw new Error('Failed');
            input.value = '';
            document.getElementById('manual-add-form').classList.add('hidden');
            await loadShoppingList();
        } catch (error) {
            console.error('Error adding item:', error);
        }
    });

    // Clear purchased
    document.getElementById('clear-purchased-btn').addEventListener('click', async () => {
        try {
            await fetch('/api/shopping-items/clear-purchased', { method: 'POST' });
            await loadShoppingList();
        } catch (error) {
            console.error('Error clearing items:', error);
        }
    });

    document.addEventListener('DOMContentLoaded', loadShoppingList);
</script>
{% endblock %}
