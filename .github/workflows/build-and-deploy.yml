name: Build, Review, and Deploy

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/kitchen-companion
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      test_passed: ${{ steps.set_output.outputs.test_passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask freezegun

      - name: Run tests
        id: run_tests
        run: python -m pytest tests/ --junitxml=test-results.xml
        continue-on-error: true

      - name: Set test output
        id: set_output
        run: |
          if [ -f test-results.xml ]; then
            FAILURES=$(grep -c 'failures="[1-9]' test-results.xml 2>/dev/null || echo 0)
            if [ "$FAILURES" -gt 0 ] || [ ! -f test-results.xml ]; then
              echo "test_passed=false" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi
          echo "test_passed=true" >> $GITHUB_OUTPUT

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          retention-days: 7

  code-review:
    needs: test
    if: github.event_name == 'pull_request' && needs.test.outputs.test_passed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        run: |
          git diff origin/${{ github.base_ref }}...origin/${{ github.head_ref }} > pr.diff
          echo "Diff size: $(wc -l < pr.diff) lines"

      - name: Install review tools
        run: |
          pip install requests

      - name: Run automated code review
        id: review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          DIFF_FILE: pr.diff
        run: |
          python .github/scripts/code-review.py
        continue-on-error: true

  build-and-push:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to sous-chef
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SOUSCHEF_HOST }}
          username: ${{ secrets.SOUSCHEF_USER }}
          key: ${{ secrets.SOUSCHEF_SSH_KEY }}
          script: |
            cd /root/kitchen-companion
            docker pull ghcr.io/${{ github.repository_owner }}/kitchen-companion:latest
            mkdir -p backups
            # Backup current DB
            docker cp kitchen-companion:/app/instance/kitchen_companion.db backups/kitchen_companion_$(date +%Y%m%d_%H%M%S).db 2>/dev/null || echo 'No existing DB to back up'
            # Keep only last 10 backups
            ls -t backups/*.db 2>/dev/null | tail -n +11 | xargs rm -f 2>/dev/null || true
            # Redeploy
            docker rm -f kitchen-companion 2>/dev/null || true
            docker compose up -d
            # Wait for healthy
            for i in $(seq 1 15); do curl -sf http://localhost:5000/ > /dev/null 2>&1 && break; sleep 2; done
            # Run migrations
            docker exec kitchen-companion flask db upgrade
            echo 'Deploy complete'
